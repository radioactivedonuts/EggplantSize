<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon"
href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍆</text></svg>">

<title>🍆 How Big is Your Eggplant?</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

*{
    box-sizing:border-box;
}

body{
    margin:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    overflow:hidden;

    font-family:'Press Start 2P', monospace;

    background:
    linear-gradient(135deg,#160020,#4b0060),
    repeating-linear-gradient(
        45deg,
        rgba(255,255,255,.03) 0px,
        rgba(255,255,255,.03) 20px,
        transparent 20px,
        transparent 40px
    );

    color:white;
}


.container{
    width:95%;
    max-width:700px;
}


h1{
    font-size:35px;
    line-height:1.5;
    color:#ffdd55;

    text-shadow:
    4px 4px #7a4b00,
    0 0 20px #ffbb00;

    margin-bottom:40px;
}


.button-area{
    position:relative;
}


button{

    font-family:'Press Start 2P', monospace;

    width:100%;
    max-width:500px;

    padding:35px 20px;

    font-size:20px;

    color:white;

    background:
    linear-gradient(#9b32c9,#5b0080);

    border:6px solid #330044;

    box-shadow:
    inset 0 -8px rgba(0,0,0,.3),
    0 10px 0 #22002d,
    0 20px 30px rgba(0,0,0,.5);

    cursor:pointer;

    transition:.15s;
}


button:hover{
    transform:translateY(-5px);

    background:
    linear-gradient(#c54aff,#7b00aa);
}


button:active{
    transform:translateY(5px);
    box-shadow:
    inset 0 -3px rgba(0,0,0,.3),
    0 5px 0 #22002d;
}



#splash{

    position:absolute;

    top:-40px;
    right:-20px;

    color:#ffff00;

    font-size:20px;

    transform:rotate(-20deg);

    text-shadow:
    3px 3px #555;

    animation:splash .5s infinite alternate;

}



@keyframes splash{

from{
transform:rotate(-20deg) scale(1);
}

to{
transform:rotate(-20deg) scale(1.15);
}

}



#result{

    margin-top:60px;

    min-height:160px;

    font-size:22px;

    line-height:2;

    color:#55ff55;

    text-shadow:

    3px 3px #003300,
    0 0 15px #00ff00;

}



.flash{

animation:pop .5s;

}


@keyframes pop{

0%{
transform:scale(1);
}

50%{
transform:scale(1.2);
}

100%{
transform:scale(1);
}

}

</style>

</head>


<body>


<div class="container">


<h1>
🍆 HOW BIG IS YOUR<br>
EGGPLANT? 🍆
</h1>


<div class="button-area">

<div id="splash"></div>

<button onclick="testLuck()">
TEST YOUR EGGPLANT
</button>

</div>


<div id="result">
PRESS THE BUTTON...
</div>


</div>



<script>


const outcomes=[

"👑 THE ULTIMATE EGGPLANT!!!<br>0418382943 call me ☎️",

"💎 GOD TIER EGGPLANT<br>MYTHICAL holy fricking gawd",

"🌟 ABSOLUTELY MASSIVE<br>No words...",

"🍆 VERY THICK EGGPLANT<br>OMGAH u r so fricking biiiig!",

"👍 SOLID EGGPLANT<br>Dayum bro ur a chad",

"🙂 DECENT EGGPLANT<br>Not bad, most men would settle for this!",

"😐 MID EGGPLANT<br>Average eggplant, could be better",

"😔 SAD EGGPLANT<br>Hope it grows...",

"💀 NO EGGPLANT<br>Ahem Men Only!"

];



const splashTexts=[

"AUBERGINE!",

"100% REAL!",

"NO VIRUS 😎",

"RNG MOMENT!",

"LEGENDARY!",

"BIG BOI!",

"EPIC DROP!",

"LUCKY?!",

"MAX SIZE?!",

"SHINY!",

"GOATED!",

"🍆🍆🍆",

"SUPER RARE!"

];



document.getElementById("splash").innerHTML=
splashTexts[Math.floor(Math.random()*splashTexts.length)];



function testLuck(){

let result=document.getElementById("result");


let roll=Math.floor(Math.random()*outcomes.length);


result.innerHTML=outcomes[roll];


result.classList.remove("flash");

void result.offsetWidth;

result.classList.add("flash");


}

</script>


</body>
</html>
