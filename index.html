<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The 🍆 Files</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍆</text></svg>">
<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');

    *{box-sizing:border-box}
    body{
        margin:0;
        font-family:'Inter', system-ui, sans-serif;
        background:linear-gradient(135deg,#2a0033,#4a004d);
        color:#ffddaa;
        min-height:100vh;
        display:flex;
        align-items:center;
        justify-content:center;
        text-align:center;
        overflow:hidden;
    }

    .container{
        max-width:620px;
        padding:20px;
        position:relative;
    }

    h1{
        font-size:3.4rem;
        margin-bottom:20px;
        text-shadow:0 0 30px #ff66aa;
        position:relative;
    }

    button{
        font-size:2.1rem;
        padding:32px 70px;
        border:none;
        border-radius:30px;
        background:linear-gradient(135deg,#aa3366,#ff4488);
        color:white;
        font-weight:700;
        cursor:pointer;
        box-shadow:0 15px 40px rgba(255,68,136,0.6);
        transition:all 0.3s;
        width:100%;
        max-width:420px;
    }

    button:hover{
        transform:scale(1.12);
        box-shadow:0 20px 50px rgba(255,68,136,0.8);
    }

    #result{
        margin-top:50px;
        font-size:2.5rem;
        font-weight:700;
        min-height:200px;
        line-height:1.4;
    }

    .flash{animation:flash 0.8s ease;}
    @keyframes flash{
        0%{transform:scale(1)}
        50%{transform:scale(1.15)}
        100%{transform:scale(1)}
    }

    .splash{
        position:absolute;
        font-size:38px;
        color:#ffff88;
        font-weight:800;
        text-shadow:3px 3px 0 rgba(0,0,0,0.9);
        pointer-events:none;
        z-index:9999;
        left:50%;
        transform:translateX(-50%);
        top:-55px;
        animation:wiggle 0.8s infinite alternate;
    }

    @keyframes wiggle{
        from{transform:translateX(-50%) rotate(-18deg);}
        to{transform:translateX(-50%) rotate(-6deg);}
    }
</style>
</head>
<body>

<div class="container">
    <h1 id="title">The 🍆 Files</h1>
    
    <button onclick="testLuck()">TEST YOUR EGGPLANT</button>
    
    <div id="result">Press the big purple button...</div>
</div>

<script>
// Minecraft splash text
function addSplashText() {
    const texts = [
        "THE REDACTED FILES", "EGGPLANTOSIS", "MAXIMUM GIRTH", 
        "VERY SUS", "CERTIFIED THICC", "AUBERGINE"
    ];
    const splash = document.createElement("div");
    splash.className = "splash";
    splash.textContent = texts[Math.floor(Math.random() * texts.length)];
    document.getElementById("title").appendChild(splash);
}

function testLuck() {
    const roll = Math.floor(Math.random() * 100) + 1; // 1 to 100 for easy percentages
    
    let message = "";
    
    if (roll <= 1) {                    // 1% chance
        message = "👑 THE ULTIMATE EGGPLANT!!!<br>You are a living legend!";
    } else if (roll <= 8) {             // 7% chance (total 8%)
        message = "💎 GOD TIER EGGPLANT<br>Extremely rare and massive!";
    } else if (roll <= 25) {            // 17% chance (total 25%)
        message = "🌟 ABSOLUTELY MASSIVE EGGPLANT<br>Impressively huge!";
    } else if (roll <= 50) {            // 25% chance (total 50%)
        message = "🍆 VERY THICK EGGPLANT<br>Respectable and satisfying!";
    } else if (roll <= 75) {            // 25% chance (total 75%)
        message = "👍 SOLID EGGPLANT<br>Pretty good size!";
    } else if (roll <= 90) {            // 15% chance
        message = "🙂 DECENT EGGPLANT<br>Not bad at all!";
    } else if (roll <= 97) {            // 7% chance
        message = "😐 MID EGGPLANT<br>Could be bigger...";
    } else {                            // 3% chance
        message = "😔 SAD EGGPLANT<br>Small and disappointing...";
    }

    const result = document.getElementById('result');
    result.innerHTML = message;
    
    result.classList.remove("flash");
    void result.offsetWidth;
    result.classList.add("flash");
}

// Initialize
window.onload = () => {
    addSplashText();
};
</script>
</body>
</html>
