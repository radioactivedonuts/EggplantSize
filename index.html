<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The 🍆 Files</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍆</text></svg>">
<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');

    *{box-sizing:border-box}
    body{
        margin:0;
        font-family:'Inter', system-ui, sans-serif;
        background:linear-gradient(135deg,#2a0033,#4a004d);
        color:#ffddaa;
        min-height:100vh;
        display:flex;
        align-items:center;
        justify-content:center;
        text-align:center;
        overflow:hidden;
    }

    .container{
        max-width:620px;
        padding:20px;
    }

    h1{
        font-size:3.2rem;
        margin-bottom:40px;
        color:#ffe4c4;
        text-shadow:0 0 40px rgba(255,102,170,0.8);
    }

    button{
        font-size:1.9rem;
        padding:28px 80px;
        border:none;
        border-radius:20px;
        background:linear-gradient(135deg,#ff4d94,#e60073);
        color:white;
        font-weight:700;
        cursor:pointer;
        box-shadow:0 15px 40px rgba(255,77,148,0.7);
        transition:all 0.3s;
        width:100%;
        max-width:420px;
        margin:20px auto;
        display:block;
    }

    button:hover{
        transform:scale(1.08);
        box-shadow:0 20px 50px rgba(255,77,148,0.9);
    }

    #result{
        margin-top:50px;
        font-size:2.4rem;
        font-weight:700;
        min-height:220px;
        line-height:1.4;
        color:#ffe4c4;
    }

    .flash{animation:flash 0.8s ease;}
    @keyframes flash{
        0%{transform:scale(1)}
        50%{transform:scale(1.12)}
        100%{transform:scale(1)}
    }

    .splash{
        position:absolute;
        font-size:38px;
        color:#ffff88;
        font-weight:800;
        text-shadow:3px 3px 0 rgba(0,0,0,0.9);
        pointer-events:none;
        z-index:9999;
        left:50%;
        transform:translateX(-50%);
        top:-48px;
        animation:wiggle 0.8s infinite alternate;
    }

    @keyframes wiggle{
        from{transform:translateX(-50%) rotate(-18deg);}
        to{transform:translateX(-50%) rotate(-6deg);}
    }
</style>
</head>
<body>

<div class="container">
    <h1 id="title">🍆 How Big is Your Eggplant? 🍆</h1>
    
    <button onclick="testLuck()">TEST YOUR EGGPLANT</button>
    
    <div id="result">Press the big purple button...</div>
</div>

<script>
// Minecraft splash text
function addSplashText() {
    const texts = ["EGGPLANTOSIS", "MAXIMUM GIRTH", "VERY SUS", "CERTIFIED THICC"];
    const splash = document.createElement("div");
    splash.className = "splash";
    splash.textContent = texts[Math.floor(Math.random() * texts.length)];
    document.getElementById("title").appendChild(splash);
}

function testLuck() {
    const max = 1000000;
    const roll = Math.floor(Math.random() * max) + 1;
    
    let message = "";
    
    if (roll === 1) {
        message = "👑 THE ULTIMATE EGGPLANT!!!<br>You are a living legend!";
    } else if (roll <= 150) {
        message = "💎 GOD TIER EGGPLANT<br>Extremely rare and massive!";
    } else if (roll <= 700) {
        message = "🌟 ABSOLUTELY MASSIVE EGGPLANT<br>Impressively huge!";
    } else if (roll <= 3000) {
        message = "🍆 VERY THICK EGGPLANT<br>Respectable and satisfying!";
    } else if (roll <= 15000) {
        message = "👍 SOLID EGGPLANT<br>Pretty good size!";
    } else if (roll <= 80000) {
        message = "🙂 DECENT EGGPLANT<br>Not bad at all!";
    } else if (roll <= 300000) {
        message = "😐 MID EGGPLANT<br>Could be bigger...";
    } else if (roll <= 700000) {
        message = "😔 TINY EGGPLANT<br>Small and disappointing...";
    } else {
        message = "💀 TRAGIC EGGPLANT<br>Did you even try?";
    }

    const result = document.getElementById('result');
    result.innerHTML = message;
    
    result.classList.remove("flash");
    void result.offsetWidth;
    result.classList.add("flash");
}

// Initialize
window.onload = () => {
    addSplashText();
};
</script>
</body>
</html>
