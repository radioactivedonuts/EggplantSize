<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍆 How Big is Your Eggplant?</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');

    *{box-sizing:border-box}
    body{
        margin:0;
        font-family:'Inter', system-ui, sans-serif;
        background:linear-gradient(135deg,#2a0033,#4a004d);
        color:#ffddaa;
        min-height:100vh;
        display:flex;
        align-items:center;
        justify-content:center;
        text-align:center;
        overflow:hidden;
    }

    .container{
        max-width:620px;
        padding:20px;
    }

    h1{
        font-size:3.4rem;
        margin-bottom:30px;
        text-shadow:0 0 30px #ff66aa;
    }

    button{
        font-size:2.1rem;
        padding:32px 70px;
        border:none;
        border-radius:30px;
        background:linear-gradient(135deg,#aa3366,#ff4488);
        color:white;
        font-weight:700;
        cursor:pointer;
        box-shadow:0 15px 40px rgba(255,68,136,0.6);
        transition:all 0.3s;
        width:100%;
        max-width:420px;
    }

    button:hover{
        transform:scale(1.12);
        box-shadow:0 20px 50px rgba(255,68,136,0.8);
    }

    #result{
        margin-top:50px;
        font-size:2.5rem;
        font-weight:700;
        min-height:200px;
        line-height:1.4;
    }

    .flash{animation:flash 0.8s ease;}
    @keyframes flash{
        0%{transform:scale(1)}
        50%{transform:scale(1.15)}
        100%{transform:scale(1)}
    }
</style>
</head>
<body>

<div class="container">
    <h1>🍆 How Big is Your Eggplant? 🍆</h1>
    
    <button onclick="testLuck()">TEST YOUR EGGPLANT</button>
    
    <div id="result">Press the big purple button...</div>
</div>

<script>
function testLuck() {
    const max = 1000000;
    const roll = Math.floor(Math.random() * max) + 1;
    
    let message = "";
    
    if (roll === 1) {
        message = "👑 THE ULTIMATE EGGPLANT!!!<br>You are a living legend!";
    } else if (roll <= 50) {
        message = "💎 GOD TIER EGGPLANT<br>Extremely rare and massive!";
    } else if (roll <= 300) {
        message = "🌟 ABSOLUTELY MASSIVE EGGPLANT<br>Impressively huge!";
    } else if (roll <= 1500) {
        message = "🍆 VERY THICK EGGPLANT<br>Respectable and satisfying!";
    } else if (roll <= 8000) {
        message = "👍 SOLID EGGPLANT<br>Pretty good size!";
    } else if (roll <= 50000) {
        message = "🙂 DECENT EGGPLANT<br>Not bad at all!";
    } else if (roll <= 200000) {
        message = "😐 MID EGGPLANT<br>Could be bigger...";
    } else if (roll <= 600000) {
        message = "😔 SAD EGGPLANT<br>Small and disappointing...";
    } else {
        message = "💀 NO EGGPLANT<br>Why are you here?";
    }

    const result = document.getElementById('result');
    result.innerHTML = message;
    
    result.classList.remove("flash");
    void result.offsetWidth;
    result.classList.add("flash");
}
</script>
</body>
</html>
